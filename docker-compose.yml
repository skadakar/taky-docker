version: "3"
services:
  taky-cot:
    image: skadakar/taky:next
    container_name: taky-cot
    user: "1000"
    ports:
            - 8087:8087
            - 8089:8089
    restart: unless-stopped
    environment:
     - mode=cot
     - public_ip=123.123.123.123
    volumes:
      - /taky-ssl/:/etc/taky/ssl/
      - /taky-data/:/data/
  taky-data:
    image: skadakar/taky:next
    container_name: taky-data
    user: "1000"
    ports:
            - 8080:8080
            - 8433:8433
    restart: unless-stopped
    environment:
     - mode=data
     - public_ip=123.123.123.123
    volumes:
      - /taky-ssl/:/etc/taky/ssl/
      - /taky-data/:/data/
volumes:
        taky-ssl:
